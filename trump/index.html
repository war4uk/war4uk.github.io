<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Sentiment Calendar</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 1rem; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(120px,1fr)); gap: 8px; }
    .day { border: 1px solid #ccc; padding: 6px; border-radius: 4px; font-size: 13px; line-height:1.3; cursor: pointer; }
    .day:focus { outline: 2px solid #0078d4; outline-offset: 2px; }
    .sentiment-pos { background:#e6ffe6; }
    .sentiment-neg { background:#ffe6e6; }
    .sentiment-neu { background:#f0f0f0; }
    .sentiment-mixed { background:#fff9e6; }
    .sentiment-empty { background:#fafafa; color:#888; }
    #status { margin-bottom: 1rem; }
    #day-popover { position: absolute; background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 8px 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); min-width: 180px; font-size: 12px; z-index: 10; }
    .popover-title { font-weight: 600; margin-bottom: 4px; }
    .popover-row { margin: 2px 0; }
    .popover-loading { color: #555; }
    .popover-error { color: #b30000; }
  </style>
<script>globalThis.__STATIC_DATA_URL__ = "/trump/data";</script>
</head>
<body>
  <h1>Social Media Sentiment Calendar</h1>
  <div id="status">Loading…</div>
  <div id="grid" hidden></div>
  <script type="module" src="./bundle.js"></script>
</body>
</html>
